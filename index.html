<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Chồn Village Gatekeeper UI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Playfair+Display:wght@400;700&amp;family=Cinzel:wght@400;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c8a96a",
                        "background-light": "#f8f7f6",
                        "background-dark": "#1e1b14",
                        "ivory": "#FFFFF5",
                        "graphite": "#1A1A1A"
                    },
                    fontFamily: {
                        "display": ["Playfair Display", "Noto Serif", "serif"],
                        "header": ["Cinzel", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .rococo-border {
            border: 2px solid #c8a96a;
            position: relative;
            padding: 2px;
        }

        .rococo-border::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 1px solid #c8a96a;
            pointer-events: none;
        }

        .corner-leaf {
            position: absolute;
            width: 40px;
            height: 40px;
            color: #c8a96a;
            z-index: 10;
        }

        body {
            min-height: max(884px, 100dvh);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-4px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(4px);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1.05);
            }
        }

        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        .animate-pop {
            animation: pop 0.3s ease-out both;
        }

        #booking-warning.active {
            color: #ef4444 !important;
            /* text-red-500 */
            display: block !important;
            font-weight: 800;
            transform: scale(1.05);
            /* Slightly enlarged when active */
        }
    </style>
</head>

<body class="bg-[#1a1a1a] font-display text-graphite">
    <!-- Full Screen Background Overlay -->

        <!-- Blurred Backdrop Image -->
        <div class="absolute inset-0 z-0">

            <div class="w-full h-full bg-cover bg-center" data-alt="Luxury Rococo bedroom with ornate gold furniture"
                style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAmDCsufgB7RpeL0KS9fMamfv7WphQa91OqFvFv6HJghpJFpDRijQeVj_CgbCXUDImNj2bSbo_xO5qRKpdG95NLB7gged1ZNRCZsFZA7_K8s2HMf2oOi4TC2jol1VaCOh3rFUxFKmHJ9wAwcqzvKlneCvuifc1YeciTH3TVgNU0y0vIDb9C0iq2n0lLtMeEFZSX1AUcdyBZ6NhbML5fcXvyO8-RGjCOLHMx38STHHqL2ctk9KNuv0JtTPoi8llmr27yZ0PtZLGF-xed')">

        <!-- Main Invitation Card -->

                </div>

                            <div class="flex items-center gap-3">

                            <input id="contact-info"

                                placeholder="+84 000 000 000" type="tel" />

                    <!-- Submit & Footnotes Container -->
                    <div class="relative w-full mt-4 pb-4">
                        <!-- Submit -->
                        <button id="submit-booking"

    <!-- Floating Contact Action Button -->

                <svg class="h-6 w-6 fill-[#1877F2]" viewBox="0 0 24 24">

                        d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />

    <!-- Script to handle floating contact toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('floating-contact-container');
            const toggleBtn = document.getElementById('contact-toggle-btn');
            const slidePanel = document.getElementById('contact-icons-slide');

            let isOpen = false;

            const toggleContactMenu = (e) => {
                if (e) {
                    e.stopPropagation();
                }
                isOpen = !isOpen;
                if (isOpen) {
                    slidePanel.classList.remove('opacity-0', 'translate-x-10', 'pointer-events-none');
                    slidePanel.classList.add('opacity-100', 'translate-x-0', 'pointer-events-auto');
                } else {
                    slidePanel.classList.remove('opacity-100', 'translate-x-0', 'pointer-events-auto');
                    slidePanel.classList.add('opacity-0', 'translate-x-10', 'pointer-events-none');
                }
            };

            if (toggleBtn) {
                toggleBtn.addEventListener('click', toggleContactMenu);
            }

            document.addEventListener('click', (event) => {
                if (isOpen && container && !container.contains(event.target)) {
                    toggleContactMenu();
                }
            });
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkinInput = document.getElementById('checkin-date');
            const checkoutInput = document.getElementById('checkout-date');
            const warningText = document.getElementById('night-warning');

            // Setup dates constraint (min today)
            const today = new Date().toISOString().split('T')[0];
            checkinInput.min = today;

            checkinInput.addEventListener('change', () => {
                // Check out must be at least the day after check in
                if (checkinInput.value) {
                    const checkinDate = new Date(checkinInput.value);
                    const nextDay = new Date(checkinDate);
                    nextDay.setDate(nextDay.getDate() + 1);
                    checkoutInput.min = nextDay.toISOString().split('T')[0];
                }
            });

            // Setup Guest Counters
            const minusAdult = document.getElementById('minus-adult');
            const plusAdult = document.getElementById('plus-adult');
            const adultCountSpan = document.getElementById('adult-count');
            let adultCount = 2;

            minusAdult.addEventListener('click', () => {
                if (adultCount > 1) {
                    adultCount--;
                    adultCountSpan.textContent = adultCount;
                }
            });

            plusAdult.addEventListener('click', () => {
                adultCount++;
                adultCountSpan.textContent = adultCount;
            });

            const minusChild = document.getElementById('minus-child');
            const plusChild = document.getElementById('plus-child');
            const childCountSpan = document.getElementById('child-count');
            let childCount = 0;
            let isCheckingPolicy = false; // New flag instead of disabling button

            minusChild.addEventListener('click', () => {
                if (childCount > 0) {
                    childCount--;
                    childCountSpan.textContent = childCount;
                }
            });

            plusChild.addEventListener('click', () => {
                childCount++;
                childCountSpan.textContent = childCount;
            });

            const bookingWarning = document.getElementById('booking-warning');
            const submitBtn = document.getElementById('submit-booking');
            const submitText = document.getElementById('submit-text');

            const POLICY_API = "https://docs.google.com/spreadsheets/d/1jszKQ6uZOqk-MD0vy--9NqISDuUDau6-gyx-KO1wck4/gviz/tq?gid=1382126270";

            const fetchJSONP = (url) => new Promise((resolve) => {
                const cbName = 'gvizCb_' + Date.now() + Math.floor(Math.random() * 10000);
                const s = document.createElement('script');
                const timeout = setTimeout(() => {
                    delete window[cbName];
                    resolve(null);
                }, 5000);
                window[cbName] = (res) => {
                    clearTimeout(timeout);
                    delete window[cbName];
                    if (s.parentNode) document.head.removeChild(s);
                    resolve(res);
                };
                s.src = url + (url.includes('?') ? '&' : '?') + 'tqx=out:json;responseHandler:' + cbName;
                document.head.appendChild(s);
            });


            const triggerWarningEffect = () => {
                // Ensure it stays red and scaled if already failed
                bookingWarning.classList.add('active');
                // Restart animations by removing and forcing reflow
                bookingWarning.classList.remove('animate-shake', 'animate-pop');
                void bookingWarning.offsetWidth; // trigger reflow
                bookingWarning.classList.add('animate-shake', 'animate-pop');
            };

            const form = document.querySelector('form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const checkinVal = checkinInput.value;
                const checkoutVal = checkoutInput.value;
                const phoneVal = document.getElementById('contact-info').value;
                const childrenAgeVal = document.getElementById('children-age').value;

                if (!checkinVal || !checkoutVal || !phoneVal) {
                    alert("Vui lòng điền đầy đủ thông tin (ngày và số điện thoại).");
                    return;
                }
                if (childCount > 0 && !childrenAgeVal) {
                    alert("Vui lòng chọn độ tuổi của trẻ em.");
                    return;
                }

                // Parse dates reliably in local time
                const parseLocal = (dateStr) => {
                    const [y, m, d] = dateStr.split('-');
                    return new Date(y, m - 1, d);
                };

                const checkinDateObj = parseLocal(checkinVal);
                const checkoutDateObj = parseLocal(checkoutVal);
                const diffTime = checkoutDateObj - checkinDateObj;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays <= 0) {
                    alert("Ngày trả phòng phải sau ngày nhận phòng.");
                    return;
                }

                if (diffDays === 1) {
                    // Start Smart Validation
                    // If already checking, just trigger animation and return
                    if (isCheckingPolicy) {
                        triggerWarningEffect();
                        return;
                    }

                    isCheckingPolicy = true;

                    try {
                        // Use Gviz API with fetchJSONP for real-time sync
                        const policyDataRaw = await fetchJSONP(POLICY_API + "&t=" + Date.now());
                        let dynamicPolicy = [];

                        if (policyDataRaw && policyDataRaw.table && policyDataRaw.table.rows) {
                            dynamicPolicy = policyDataRaw.table.rows.map(row => ({
                                Month_ID: row.c[0] ? row.c[0].v : null,
                                Min_Days_Lead: row.c[1] ? row.c[1].v : null
                            })).filter(p => p.Month_ID !== null);
                        }

                        // Bảng dữ liệu tĩnh từ ảnh bạn gửi (Fallback)
                        const STATIC_POLICY = {
                            1: 5, 2: 5, 3: 4, 4: 7, 5: 7, 6: 5, 7: 5, 8: 5, 9: 7, 10: 7, 11: 7, 12: 5
                        };

                        console.log("[V4.2-REALTIME] Policy sync started.", { dynamicPolicy });

                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        const daysLead = Math.ceil((checkinDateObj - today) / (1000 * 60 * 60 * 24));
                        const monthId = checkinDateObj.getMonth() + 1;

                        let minDaysLead = STATIC_POLICY[monthId] || 7;

                        // Ưu tiên dữ liệu từ Sheet
                        if (dynamicPolicy.length > 0) {
                            const found = dynamicPolicy.find(p => p.Month_ID === monthId);
                            if (found && found.Min_Days_Lead !== null) {
                                minDaysLead = found.Min_Days_Lead;
                            }
                        }

                        isLastMinute = daysLead <= minDaysLead;

                        console.log("Policy check details:", {
                            monthId,
                            daysLead,
                            minDaysLeadRequired: minDaysLead,
                            isLastMinute
                        });

                        if (isLastMinute) {
                            console.warn("Smart Logic: Blocked 1-night stay (Too close to travel date)");
                            triggerWarningEffect();
                            isCheckingPolicy = false;
                            return;
                        }
                    } catch (err) {
                        console.error("Policy check failed", err);
                        triggerWarningEffect();
                        isCheckingPolicy = false;
                        return;
                    } finally {
                        // In case of success (isLastMinute is true), we don't necessarily reset isCheckingPolicy 
                        // because we are navigating away. But for safety:
                        // isCheckingPolicy = false; 
                    }
                }

                // If allowed (diffDays >= 2 OR Smart Check passed)
                const bookingData = {
                    checkin: checkinVal,
                    checkout: checkoutVal,
                    adults: adultCount,
                    children: childCount,
                    childrenAgeCategory: document.getElementById('children-age').value,
                    phone: phoneVal
                };
                sessionStorage.setItem('chonVillageBooking', JSON.stringify(bookingData));
                window.location.href = "rooms.html";
            });
        });
    </script>

</body>
