<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Playfair+Display:wght@400;700&amp;family=Cinzel:wght@400;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c8aa6a",
                        "background-light": "#FFFFF5",
                        "background-dark": "#1e1b14",
                        "graphite": "#1A1A1A",
                    },
                    fontFamily: {
                        "header": ["Cinzel", "serif"],
                        "display": ["Playfair Display", "Noto Serif", "serif"],
                        "sans": ["Noto Serif", "serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .rococo-border {
            border: 2px solid #c8aa6a;
            position: relative;
            padding: 4px;
        }

        .rococo-border::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border: 1px solid #c8aa6a;
            pointer-events: none;
        }

        .acanthus-corner {
            position: absolute;
            width: 24px;
            height: 24px;
            color: #c8aa6a;
            z-index: 10;
        }

        @keyframes slideUpElastic {
            0% {
                transform: translateY(80px) scale(0.95);
                opacity: 0;
                filter: blur(8px);
            }

            50% {
                transform: translateY(-12px) scale(1.02);
                opacity: 1;
                filter: blur(0px);
            }

            75% {
                transform: translateY(4px) scale(0.99);
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
                filter: blur(0px);
            }
        }

        /* Base state for cards before they scroll into view */
        .scroll-animate-card {
            opacity: 0;
            transform: translateY(80px) scale(0.95);
            will-change: transform, opacity, filter;
            transition: opacity 0.3s ease;
            /* fallback */
        }

        /* Class added by IntersectionObserver */
        .scroll-animate-card.is-visible {
            animation: slideUpElastic 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-sans text-graphite dark:text-slate-100">
    <div class="relative flex min-h-screen w-full flex-col">
        <!-- Header -->
        <header
            class="flex items-center justify-between px-4 py-4 border-b border-primary/20 bg-background-light/80 backdrop-blur-md sticky top-0 z-50">
            <button onclick="window.location.href='index.html';"
                class="flex items-center justify-center p-2 text-primary active:scale-95 transition-transform">
                <span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
            </button>
            <h1 class="font-display text-xl font-bold tracking-tight text-graphite">Chồn Village</h1>
            <button class="flex items-center justify-center p-2 text-primary opacity-0">
                <span class="material-symbols-outlined">search</span>
            </button>
        </header>
        <!-- Summary Bar -->
        <!-- Summary Bar -->
        <div id="summary-bar"
            class="px-4 py-3 bg-white border-b border-primary/20 cursor-pointer active:bg-slate-50 transition-colors shadow-sm relative z-40 flex items-center justify-between">
            <div class="flex flex-col gap-1.5 justify-center">
                <div class="flex items-center gap-2 text-primary">
                    <span class="material-symbols-outlined text-lg">calendar_month</span>
                    <span id="summary-dates" class="font-bold text-base tracking-wide text-graphite"></span>
                </div>
                <div class="flex items-center gap-2 text-primary/70">
                    <span class="material-symbols-outlined text-base">group</span>
                    <span id="summary-guests" class="text-sm font-medium tracking-wide"></span>
                </div>
            </div>
            <div
                class="group flex items-center gap-1.5 text-[#C8A96A] bg-[#FAF6EC] px-4 py-2 rounded-full hover:bg-gradient-to-r hover:from-[#C8A96A] hover:via-[#E8D399] hover:to-[#C8A96A] hover:text-[#FAF6EC] transition-all duration-500 shadow-sm border border-[#C8A96A]/20">
                <span
                    class="text-xs font-header font-bold uppercase tracking-widest group-hover:text-[#FAF6EC] transition-colors duration-500">Thay
                    đổi ngày</span>
                <span
                    class="material-symbols-outlined text-[1rem] group-hover:text-[#FAF6EC] transition-colors duration-500">edit</span>
            </div>
        </div>
        <!-- Main Content -->
        <main class="flex-1 pb-16">
            <div class="p-6 text-center">
                <h2 class="font-display text-3xl font-bold text-graphite mb-2">Danh Sách Phòng</h2>
                <div class="flex justify-center mb-6">
                    <div class="h-0.5 w-16 bg-primary"></div>
                </div>
                <!-- Message -->
                <div id="available-rooms-message" class="flex justify-center pb-4 px-4 hidden">
                    <p class="text-xl font-display text-primary italic text-center">
                        Những phòng đang hiển thị là những phòng trống vào ngày bạn chọn.
                    </p>
                </div>
            </div>
            <!-- Room Grid -->
            <div id="rooms-container" class="px-4 space-y-8">
                <!-- Dynamic Rooms will be populated here -->
            </div>
        </main>
    </div>

    <script src="js/rooms.js?v=2.9"></script>

    <!-- Floating Contact Buttons -->
    <div class="fixed bottom-8 right-6 z-50 flex flex-col gap-3">
        <!-- Phone Button -->
        <a href="tel:0369877478"
            class="group relative flex h-9 w-9 items-center justify-center rounded-full bg-white shadow-lg border border-primary transition-transform hover:scale-110">
            <span class="material-symbols-outlined text-primary text-lg">call</span>
            <span
                class="absolute right-full mr-3 hidden rounded-md bg-graphite/90 px-3 py-1.5 text-xs font-bold tracking-widest text-white uppercase group-hover:block whitespace-nowrap">Gọi
                Hotline</span>
        </a>

        <!-- Fanpage Button -->
        <a href="https://facebook.com/chon.village" target="_blank"
            class="group relative flex h-9 w-9 items-center justify-center rounded-full bg-white shadow-lg border border-primary transition-transform hover:scale-110">
            <svg class="h-5 w-5 fill-[#1877F2]" viewBox="0 0 24 24">
                <path
                    d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
            </svg>
            <span
                class="absolute right-full mr-3 hidden rounded-md bg-[#1877F2]/90 px-3 py-1.5 text-xs font-bold tracking-widest text-white uppercase group-hover:block whitespace-nowrap">Fanpage</span>
        </a>

        <!-- Zalo Button -->
        <a href="https://zalo.me/0369877478" target="_blank"
            class="group relative flex h-9 w-9 items-center justify-center rounded-full bg-white shadow-lg border border-primary transition-transform hover:scale-110">
            <img class="h-5 w-5 object-contain"
                src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Icon_of_Zalo.svg/1200px-Icon_of_Zalo.svg.png"
                alt="Zalo" />
            <span
                class="absolute right-full mr-3 hidden rounded-md bg-[#0068FF]/90 px-3 py-1.5 text-xs font-bold tracking-widest text-white uppercase group-hover:block whitespace-nowrap">Zalo</span>
        </a>
    </div>

    <!-- Edit Booking Modal -->
    <div id="edit-booking-modal"
        class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm hidden flex-col justify-end sm:justify-center items-center opacity-0 transition-opacity duration-300 p-4">
        <div class="bg-[#FFFFF5] rounded-sm p-1 w-full max-w-md transform translate-y-full sm:translate-y-0 transition-transform duration-300 relative"
            id="edit-booking-content">
            <button id="close-modal-btn"
                class="absolute -top-10 right-0 p-2 text-white hover:text-primary transition-colors z-50">
                <span class="material-symbols-outlined text-2xl">close</span>
            </button>
            <div class="rococo-border bg-[#FFFFF5] p-6 flex flex-col items-center">
                <!-- Acanthus Leaf Corners -->
                <div class="acanthus-corner top-0 left-0">
                    <svg fill="currentColor" viewbox="0 0 100 100">
                        <path d="M10,10 Q40,10 40,40 Q10,40 10,10 M0,0 L20,0 Q20,20 0,20 Z"></path>
                    </svg>
                </div>
                <div class="acanthus-corner top-0 right-0 rotate-90">
                    <svg fill="currentColor" viewbox="0 0 100 100">
                        <path d="M10,10 Q40,10 40,40 Q10,40 10,10 M0,0 L20,0 Q20,20 0,20 Z"></path>
                    </svg>
                </div>
                <div class="acanthus-corner bottom-0 left-0 -rotate-90">
                    <svg fill="currentColor" viewbox="0 0 100 100">
                        <path d="M10,10 Q40,10 40,40 Q10,40 10,10 M0,0 L20,0 Q20,20 0,20 Z"></path>
                    </svg>
                </div>
                <div class="acanthus-corner bottom-0 right-0 rotate-180">
                    <svg fill="currentColor" viewbox="0 0 100 100">
                        <path d="M10,10 Q40,10 40,40 Q10,40 10,10 M0,0 L20,0 Q20,20 0,20 Z"></path>
                    </svg>
                </div>

                <h3 class="font-display font-bold text-2xl text-graphite uppercase tracking-wide mb-6">THAY ĐỔI NGÀY
                </h3>

                <div class="w-full space-y-6">
                    <!-- Dates -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col">
                            <label class="text-[10px] uppercase tracking-widest text-[#c8a96a] font-bold mb-1">Nhận
                                phòng</label>
                            <div
                                class="border border-[#c8a96a]/40 p-1.5 flex justify-between items-center bg-transparent mt-1 h-9">
                                <input id="modal-checkin"
                                    class="bg-transparent border-none focus:ring-0 text-graphite text-sm p-0 rounded-none outline-none w-full"
                                    type="date" />
                            </div>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-[10px] uppercase tracking-widest text-[#c8a96a] font-bold mb-1">Trả
                                phòng</label>
                            <div
                                class="border border-[#c8a96a]/40 p-1.5 flex justify-between items-center bg-transparent mt-1 h-9">
                                <input id="modal-checkout"
                                    class="bg-transparent border-none focus:ring-0 text-graphite text-sm p-0 rounded-none outline-none w-full"
                                    type="date" />
                            </div>
                        </div>
                    </div>

                    <!-- Guests Section -->
                    <div class="space-y-4 pt-4">
                        <div class="flex items-center justify-between border-b border-[#c8a96a]/20 pb-4">
                            <span class="text-xs font-serif text-graphite uppercase tracking-widest">Người Lớn</span>
                            <div class="flex items-center gap-3">
                                <button id="modal-minus-adult"
                                    class="size-6 rounded-full border border-[#c8a96a] text-[#c8a96a] flex items-center justify-center text-xs"
                                    type="button">-</button>
                                <span id="modal-adult-count" class="text-graphite font-bold w-4 text-center">2</span>
                                <button id="modal-plus-adult"
                                    class="size-6 rounded-full bg-[#c8a96a] text-white flex items-center justify-center text-xs"
                                    type="button">+</button>
                            </div>
                        </div>
                        <div class="flex items-center justify-between border-b border-[#c8a96a]/20 pb-4">
                            <div class="flex flex-col">
                                <span class="text-xs font-serif text-graphite uppercase tracking-widest">Trẻ Em</span>
                                <select id="modal-children-age"
                                    class="text-[10px] text-[#c8a96a] bg-transparent border-none py-0 pl-0 pr-5 focus:ring-0 uppercase cursor-pointer hidden mt-1 outline-none">
                                    <option value="" disabled selected hidden>Chọn độ tuổi</option>
                                    <option value="1">1 tuổi</option>
                                    <option value="2">2 tuổi</option>
                                    <option value="3">3 tuổi</option>
                                    <option value="4">4 tuổi</option>
                                    <option value="5">5 tuổi</option>
                                    <option value="6">6 tuổi</option>
                                    <option value="7">7 tuổi</option>
                                    <option value="8">8 tuổi</option>
                                    <option value="9">9 tuổi</option>
                                    <option value="10">10 tuổi</option>
                                    <option value="11">11 tuổi</option>
                                    <option value="12">12 tuổi</option>
                                </select>
                            </div>
                            <div class="flex items-center gap-3">
                                <button id="modal-minus-child"
                                    class="size-6 rounded-full border border-[#c8a96a] text-[#c8a96a] flex items-center justify-center text-xs"
                                    type="button">-</button>
                                <span id="modal-child-count" class="text-graphite font-bold w-4 text-center">0</span>
                                <button id="modal-plus-child"
                                    class="size-6 rounded-full bg-[#c8a96a] text-white flex items-center justify-center text-xs"
                                    type="button">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="w-full mt-8 pt-2">
                    <button id="modal-save-btn"
                        class="w-full bg-[#c8a96a] hover:bg-gradient-to-r hover:from-[#C8A96A] hover:via-[#E8D399] hover:to-[#C8A96A] hover:text-graphite text-[#FFFFF5] font-header uppercase tracking-widest py-4 transition-all duration-500 text-sm shadow-lg flex items-center justify-center cursor-pointer border-none outline-none">
                        ĐỔI NGÀY
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/rooms.js?v=2.10"></script>
</body>

</html>
